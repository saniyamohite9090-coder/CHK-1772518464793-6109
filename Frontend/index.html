<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI · Secure Banking</title>
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f0f8ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* main card – white background */
        .sbi-card {
            width: 100%;
            max-width: 880px;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 30px 50px rgba(0, 100, 150, 0.25), 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #c0e0ff;
        }

        /* header – sky blue */
        .sbi-header {
            background: #7ec8ff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 4px solid #f5b41a;
        }

        .sbi-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sbi-logo i {
            font-size: 3.2rem;
            color: #0a3d62;
            filter: drop-shadow(2px 2px 0 #f5b41a);
        }

        .sbi-logo-text {
            color: #0a3d62;
            line-height: 1.2;
        }

        .sbi-logo-text .top {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .sbi-logo-text .bank-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #003366;
        }

        /* no security chip/messages */
