<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI · Voice Banking</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sbi-card" id="appRoot">
        <!-- Header -->
        <div class="sbi-header">
            <div class="sbi-logo">
                <i class="fas fa-university"></i>
                <div class="sbi-logo-text">
                    <div class="top">State Bank of India</div>
                    <div class="bank-name">SBI</div>
                </div>
            </div>
        </div>

        <!-- PAGE 1 : WELCOME -->
        <div id="pageWelcome" class="page">
            <div class="welcome-hero">
                <div class="welcome-text">
                    <h2>Welcome To</h2>
                    <h1>State Bank of India</h1>
                </div>
            </div>
            <div style="text-align: center; margin: 20px 0 10px;">
                <button class="btn btn-primary" id="gotoAuthBtn">Continue</button>
            </div>
        </div>

        <!-- PAGE 2 : SIGN IN / REGISTER CHOICE -->
        <div id="pageAuthChoice" class="page hidden-page">
            <h2><i class="fas fa-lock"></i> Authentication</h2>
            <div class="flex-row" style="justify-content: center; margin: 30px 0;">
                <button class="btn" id="showSigninBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                <button class="btn btn-primary" id="showRegisterBtn"><i class="fas fa-user-plus"></i> Register</button>
            </div>
        </div>

        <!-- PAGE 3 : REGISTRATION FORM -->
        <div id="pageRegister" class="page hidden-page">
            <h3><i class="fas fa-edit"></i> New Customer Registration</h3>
            <div class="field">
                <label>Full name</label>
                <input type="text" id="regName" placeholder="Rajesh Kumar">
            </div>
            <div class="row2">
                <div class="field">
                    <label>Aadhaar number</label>
                    <input type="text" id="regAadhar" maxlength="12" placeholder="12 digits">
                </div>
                <div class="field">
                    <label>Date of birth</label>
                    <input type="date" id="regDob">
                </div>
            </div>
            <div class="row2">
                <div class="field">
                    <label>Gender</label>
                    <select id="regGender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="field">
                    <label>Mobile</label>
                    <input type="tel" id="regMobile" placeholder="9876543210">
                </div>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="name@example.com">
            </div>
            <div class="field">
                <label>Create password</label>
                <input type="password" id="regPwd" placeholder="••••••••">
            </div>
            <div class="flex-row">
                <button class="btn btn-primary" id="registerUserBtn"><i class="fas fa-check-circle"></i> Register</button>
                <button class="btn btn-secondary" id="backFromReg">Back</button>
            </div>
        </div>

        <!-- PAGE 4 : VERIFICATION -->
        <div id="pageVerify1" class="page hidden-page">
            <h3><i class="fas fa-microchip"></i> Voice Verification</h3>
            <div class="field">
                <label>Aadhaar number</label>
                <input type="text" id="loginUid" placeholder="Enter Aadhaar">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPwd" placeholder="••••••••">
            </div>

            <div class="mic-panel">
                <div class="mic-row">
                    <div class="mic-device">
                        <div class="mic-circle" id="micButton">
                            <i class="fas fa-microphone"></i>
                        </div>
                        <span class="mic-label" id="micStatusLabel">tap to speak</span>
                    </div>
                    <div class="question-bubble" id="questionDisplay">Security question</div>
                </div>
                <div class="status-message" id="voiceStatus">
                    <span id="audioMessage">Tap microphone and speak your answer</span>
                </div>
            </div>

            <div class="flex-row" style="justify-content: space-between;">
                <button class="btn btn-primary" id="submitV1"><i class="fas fa-shield-halved"></i> Verify</button>
                <button class="btn btn-secondary" id="backFromV1">Cancel</button>
            </div>
            <div class="small-note">You have 5 attempts. New question each time.</div>
        </div>

        <!-- PAGE 5 : SHAPE VERIFICATION -->
        <div id="pageVerify2" class="page hidden-page">
            <div class="alert-info">
                <i class="fas fa-exclamation-triangle"></i> Maximum attempts exceeded
            </div>
            <h3>Draw the shape shown below</h3>
            <div style="text-align: center;">
                <span class="shape-badge" id="shapeDisplay">⬤</span>
            </div>
            <div class="canvas-area">
                <canvas id="drawCanvas" width="340" height="200"></canvas>
                <div class="flex-row" style="justify-content: center; margin-top: 12px;">
                    <button class="btn btn-secondary" id="clearCanvas"><i class="fas fa-eraser"></i> Clear</button>
                    <button class="btn btn-primary" id="submitShape"><i class="fas fa-check"></i> Submit</button>
                </div>
            </div>
            <button class="btn btn-secondary" id="backFromV2">← Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
